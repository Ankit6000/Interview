services:
  - type: web
    name: jelly-f1-interview-coach
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: nvidia/nemotron-3-super-120b-a12b:free
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_TRANSCRIBE_MODELS
        value: gemini-3.1-flash-lite-preview,gemini-2.5-flash-lite,gemini-2.5-flash
